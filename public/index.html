<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ra's Treasury</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Ra's Treasury</h1>
            <p class="subtitle">"Ra sees what is given. Not what is hidden."</p>
        </header>

        <main>
            <section class="offerings-section">
                <h2>Your Offerings</h2>
                <div id="offerings-list" class="grid">
                    <!-- Offerings will be populated here -->
                </div>
            </section>

            <section class="submission-section">
                <h2>Make an Offering</h2>
                <form id="offering-form">
                    <div class="input-group">
                        <label for="name">Offering Name</label>
                        <input type="text" id="name" placeholder="E.g., Golden Scarab" required>
                    </div>
                    <div class="input-group">
                        <label for="value">Opulence Value</label>
                        <input type="number" id="value" placeholder="100" required>
                    </div>
                    <!-- The system is blind to what you don't show -->
                    <button type="submit" class="btn-primary">Present to Ra</button>
                </form>
            </section>

            <section class="admin-section">
                <button id="admin-btn" class="btn-secondary">Visit Admin Shrine</button>
                <div id="admin-response" class="hidden"></div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
